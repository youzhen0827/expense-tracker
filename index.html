<!DOCTYPE html>

<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳本</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header>
    <div class="logo"><span>💰</span> 記帳本</div>
    <div class="header-right">
      <div class="year-badge" id="yearBadge"></div>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️ 淺色</button>
    </div>
  </header>

  <div class="balance-card">
    <div class="balance-label">總結餘</div>
    <div class="balance-amount zero" id="balance">$0.00</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon income">▲</div>
      <div class="stat-info">
        <div class="stat-label">總收入</div>
        <div class="stat-amount income" id="totalIncome">$0.00</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon expense">▼</div>
      <div class="stat-info">
        <div class="stat-label">總支出</div>
        <div class="stat-amount expense" id="totalExpense">$0.00</div>
      </div>
    </div>
  </div>

  <div class="month-section">
    <div class="section-title">月份篩選</div>
    <div class="month-filter" id="monthFilter">
      <button class="month-btn all-btn active" data-month="all">全部</button>
      <button class="month-btn" data-month="1">一月</button>
      <button class="month-btn" data-month="2">二月</button>
      <button class="month-btn" data-month="3">三月</button>
      <button class="month-btn" data-month="4">四月</button>
      <button class="month-btn" data-month="5">五月</button>
      <button class="month-btn" data-month="6">六月</button>
      <button class="month-btn" data-month="7">七月</button>
      <button class="month-btn" data-month="8">八月</button>
      <button class="month-btn" data-month="9">九月</button>
      <button class="month-btn" data-month="10">十月</button>
      <button class="month-btn" data-month="11">十一月</button>
      <button class="month-btn" data-month="12">十二月</button>
    </div>
    <div class="month-detail" id="monthDetail">
      <div class="month-detail-title">
        <span id="monthDetailTitle"></span>
        <div class="month-detail-stats" id="monthDetailStats"></div>
      </div>
      <ul class="month-tx-list" id="monthTxList"></ul>
    </div>
  </div>

  <div class="add-form">
    <div class="section-title">新增記錄</div>
    <div class="form-grid">
      <div class="form-field">
        <label>項目名稱</label>
        <input type="text" id="txName" placeholder="例：早餐、薪水">
      </div>
      <div class="form-field">
        <label>金額（負數＝支出）</label>
        <input type="number" id="txAmount" placeholder="例：150 或 -150">
      </div>
      <div class="form-field">
        <label>日期</label>
        <input type="date" id="txDate">
      </div>
      <div class="form-field">
        <label>類別</label>
        <select id="txCategory">
          <option value="飲食">🍜 飲食</option>
          <option value="交通">🚌 交通</option>
          <option value="購物">🛍 購物</option>
          <option value="娛樂">🎮 娛樂</option>
          <option value="醫療">🏥 醫療</option>
          <option value="住居">🏠 住居</option>
          <option value="薪水">💼 薪水</option>
          <option value="投資">📈 投資</option>
          <option value="其他">📌 其他</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="add-btn" onclick="addTransaction()">＋ 新增記錄</button>
      <button class="clear-btn" onclick="clearAll()">清除全部</button>
    </div>
  </div>

  <div class="list-header">
    <div class="section-title" style="margin-bottom:0">交易記錄</div>
    <div class="tx-count" id="txCount">0 筆</div>
  </div>
  <ul class="tx-list" id="txList"></ul>

</div>

<div class="toast" id="toast"></div>
<script src="index.js"></script>
</body>
</html>
